version: "3.9"

services:
  api:
    build: .
    image: agentic-rag-platform:latest
    container_name: agentic-rag-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env/variables.env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  ui:
    image: agentic-rag-platform:latest
    container_name: agentic-rag-ui
    restart: unless-stopped
    command: >
      streamlit run ui/streamlit_app.py
      --server.port 8501
      --server.address 0.0.0.0
    environment:
      AGENTIC_RAG_API: "http://api:8000/api/v1"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8501:8501"
