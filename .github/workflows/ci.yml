name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff lint
        run: ruff check src tests scripts

      - name: Ruff format check
        run: ruff format --check src tests scripts ui

      - name: Import smoke test
        run: |
          python -c "import agentic_rag, agentic_rag.api, agentic_rag.agents, agentic_rag.retrieval; print('ok')"

      - name: Pytest
        run: pytest -q --no-cov

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t agentic-rag-platform:ci .
